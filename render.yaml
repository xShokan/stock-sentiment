# Render 部署配置
# 推送 GitHub 后在 Render 控制台 New → Web Service → 选择仓库即可
# 或访问: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: stocksense
    runtime: docker
    repo: https://github.com/YOUR_USERNAME/stock-sentiment
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8000
      - key: PYTHONUNBUFFERED
        value: "1"
